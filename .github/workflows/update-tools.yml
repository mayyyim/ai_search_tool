name: 自动更新AI工具库

on:
  schedule:
    # 每周一北京时间上午9点运行（UTC 01:00）
    - cron: "0 1 * * 1"
  workflow_dispatch: # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 运行更新脚本
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-tools.mjs

      - name: 检查是否有变更
        id: check
        run: |
          if git diff --quiet data/tools.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交并推送更新
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "AI Tools Bot"
          git config user.email "bot@github.com"
          git add data/tools.json
          TOOL_COUNT=$(node -e "const d=require('./data/tools.json'); console.log(d.tools.length)")
          git commit -m "chore: 自动更新工具库，共 ${TOOL_COUNT} 个工具 [$(date +'%Y-%m-%d')]"
          git push
